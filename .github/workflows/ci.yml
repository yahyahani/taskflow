name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint, type-check, build
    runs-on: ubuntu-latest

    # Prisma needs a real database to generate against and to run
    # migrations against in the test step below.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskflow_test?schema=public
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Lint
        run: npm run lint --workspace=apps/api

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: apps/api

      - name: Test
        run: npm run test --workspace=apps/api

      - name: Build
        run: npm run build --workspace=apps/api

  web:
    name: Web — lint, type-check, build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/web

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: apps/web

      - name: Build
        run: npm run build --workspace=apps/web
